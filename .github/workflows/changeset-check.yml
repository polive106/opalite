name: Changeset Check

on:
  pull_request:
    branches: [main]

jobs:
  changeset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Check for changeset
        run: bunx changeset status --since=origin/main
